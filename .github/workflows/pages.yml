name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/session-capabilities-m2in5d
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞り、進行中のものはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        # enablement: true で Pages 自体も自動で有効化する（手動設定不要）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install
        run: npm ci

      - name: Build static site
        env:
          PAGES: 'true'
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
